<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINTER PROJECT 👽</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body id="page1">
    <div class="terminal-container">
        <div class="terminal-header">WYMM>_ WINTER PROJECT.EXE 👽</div>
        <div class="terminal-body">

            <div id="quizSection">
                <div class="quiz-question">
                    <div id="questionContent"></div>
                    <div class="input-line">
                        <span class="prompt">WYMM>_ </span>
                        <input type="text" id="answerInput" class="answer-input" placeholder="여기에 정답을 입력하세요...(숫자 6자리)">
                        <span id="cursor" class="blinking-cursor"></span>
                    </div>
                </div>
                <div id="result" class="result-message"></div>
                <div class="quiz-controls">
                    <button id="checkButton" class="dos-selection-item">> 정답을 확인하세요...</button>
                    
                </div><br>
            </div>

            <div id="storySection" class="hidden">
                <div id="storyText"></div>
                <div id="promptContinue" class="hidden">
                    <p>Press Enter or click to continue...</p>
                    <span id="cursorContinue" class="blinking-cursor"></span>
                </div>
                <br><button id="finalButton" class="dos-selection-item hidden">다음 문제로 이동하세요...</button>
            </div>
        </div>
    </div>
    
    <template id="question-text-1">
        <h3>To. PENG.E </h3>
        <p class="qrcode"><img src="1000016175.png" class="qrcode"></p>
        <br><p>1. 먼저 본인의 핸드폰을 통해서 위의 코드에 접속한 뒤 <mark>②메시지</mark>를 보내세요!</p>
        <p>2. 모든 문제를 꼼꼼하게 읽어주세요.</p>
        <p>3. 아이템 <span id="newbBag"><mark>①뉴비의 가방</mark></span>을 사용하여, '제일 가까운 별의 상점'에 도착하셨겠죠?</p>
        <p>4. 꼭 'WIFI'가 연결된 공간에서 문제를 풀어야 합니다.</p>
        <p>5. 프로도처럼 끝까지 포기하지 말아 주세요.</p>
        <p>6. 문제의 정답은 1♡♡日 입니다.</p>
        <p>7. 럭키! 행운을 빕니다.</p>
        <h2>////////////////////////////////////////////////////</h2>

    </template>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            newbBag.addEventListener('click', () => {
                alert("채팅코드 : 뉴비의 가방을 찾아왔다!");
            });

        });
        
        
    </script>
</body>

</html>
