<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINTER PROJECT 👽</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body id="7">
    <div class="terminal-container">
        <div class="terminal-header">WYMM>_ WINTER PROJECT.EXE 👽</div>
        <div class="terminal-body">
            
            <div id="quizSection">
                <div class="quiz-question">
                    <div id="questionContent"></div>
                    <div class="input-line">
                        <span class="prompt">WYMM>_ </span>
                        <input type="text" id="answerInput" class="answer-input" placeholder="여기에 정답을 입력하세요...(숫자 10자리)">
                        <span id="cursor" class="blinking-cursor"></span>
                    </div>
                </div>
                <div id="result" class="result-message"></div>
                <div class="quiz-controls">
                    <button id="checkButton" class="dos-selection-item">> 정답을 확인하세요...</button>
                    
                </div><br>
            </div>

            <div id="storySection" class="hidden">
                <div id="storyText"></div>
                <div id="promptContinue" class="hidden">
                    <p>Press Enter or click to continue...</p>
                    <span id="cursorContinue" class="blinking-cursor"></span>
                </div>
                <br><button id="finalButton" class="dos-selection-item hidden">다음 문제로 이동하세요...</button>
            </div>
        </div>
    </div>
    
    <template id="question-text-7">
        <div class="text-center">
            <h3>[ 선택의 방 ]</h3>
            <p>=IF(문제="진실", 0, 1)<br><mark>The yellow one is you.</mark></p>
            <div class="question-room-7">
                01. 함께 걸은 둘레길의 이름은 '사색에 잠겨 걷는 호젓한 숲길'이다<br>
                02. '나'는 마카오 카지노에서 돈을 2배 땄다<br>
                03. 동해에서 발견한 네잎클로버는 4개이다<br>
                04. 첫 번째 네잎클로버는 비자림에서 발견했다.<br>
                05. <mark>'나'</mark>는 삼척여행 이후로 꽃을 좋아하게 되었다.<br>
                06. 함께 지은 태명은 쿵따기이다<br>
                07. 은퇴하고 동해에 함께 내려오기로 약속했다.<br>
                08. '나'는 500일에 장미꽃을 받았다.<br>
                09. 홍콩에서 판다인형을 같이 구매했다.<br>
                10. 영화 '프레디의 피자가게'는 교제 이후에 보러갔다
            </div>

        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
